---
namespace: zelos
name: dgx
version: 0.2.0
readme: README.md
authors:
  - kmechlin
description: >
  Provision headless NVIDIA DGX-class workstations (Lenovo PGX, DGX Station,
  DGX Spark) running DGX OS for remote desktop (Sunshine/Moonlight) and
  OpenAI-compatible AI model serving (vLLM) over Tailscale.
license:
  - Apache-2.0
tags:
  - infrastructure
  - linux
  - nvidia
  - dgx
  - gpu
  - ai
  - vllm
  - sunshine
  - tailscale
  - k3s
dependencies:
  community.general: ">=8.0.0"
  ansible.posix: ">=1.5.0"
  community.docker: ">=3.10.0"
repository: https://github.com/kmechlin/zelos.dgx
issues: https://github.com/kmechlin/zelos.dgx/issues
build_ignore:
  - .github
  - .yamllint.yml
  - .gitignore
  - venv
  - .venv
  - inventory
  - cli
  - pyproject.toml
  - scripts
  - "*.egg-info"
  - Dockerfile
  - Makefile
