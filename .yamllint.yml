---
extends: default
rules:
  line-length:
    max: 200
    level: warning
  truthy:
    allowed-values: ['true', 'false']
    check-keys: false
  comments:
    min-spaces-from-content: 1
  braces:
    max-spaces-inside: 1
  octal-values:
    forbid-implicit-octal: true
  indentation:
    spaces: 2
    indent-sequences: true
ignore: |
  .ansible/
  venv/
  .venv/
  collections/
