---
# Ansible collection lint (Workflow name: unit-tests).
#
# Required check on PRs into develop (branch protection).
# molecule integration tests deferred to v1.0 (see CLAUDE.md). Playbook
# syntax-check requires collection install which is non-trivial in CI for a
# repo that IS the collection; ansible-lint already covers playbook
# correctness for our purposes.
name: unit-tests

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [develop]
  push:
    branches: [develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install ansible ansible-lint
      - name: ansible-lint
        run: ansible-lint
