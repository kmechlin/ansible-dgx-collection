---
name: release-tag
on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  tag-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version from galaxy.yml
        id: ver
        run: |
          v=$(awk '/^version:/ {print $2; exit}' galaxy.yml)
          if [ -z "$v" ]; then
            echo "::error::Could not read version from galaxy.yml"
            exit 1
          fi
          echo "v=$v" >> "$GITHUB_OUTPUT"
          echo "Detected version: $v"

      - name: Check if tag already exists
        id: exists
        run: |
          if git rev-parse "v${{ steps.ver.outputs.v }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag v${{ steps.ver.outputs.v }} already exists, skipping."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create and push tag
        if: steps.exists.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "v${{ steps.ver.outputs.v }}" -m "Release v${{ steps.ver.outputs.v }}"
          git push origin "v${{ steps.ver.outputs.v }}"

      - name: Create GitHub Release
        if: steps.exists.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ steps.ver.outputs.v }}" \
            --title "v${{ steps.ver.outputs.v }}" \
            --generate-notes
