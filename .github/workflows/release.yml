---
name: release
on:
  push:
    branches: [main, develop]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'ROADMAP.md'
      - 'CHANGELOG.md'
      - '.github/ISSUE_TEMPLATE/**'
    tags: ['v*']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Read version
        id: version
        run: |
          if [ -f galaxy.yml ]; then
            VERSION=$(grep -E '^version:' galaxy.yml | head -1 | awk '{print $2}' | tr -d '"' | tr -d "'")
            SOURCE="galaxy.yml"
          elif [ -f pyproject.toml ]; then
            VERSION=$(grep -E '^version[[:space:]]*=' pyproject.toml | head -1 | sed -E 's/version[[:space:]]*=[[:space:]]*"([^"]+)".*/\1/')
            SOURCE="pyproject.toml"
          else
            echo "::error::No version source (looked for galaxy.yml then pyproject.toml)"
            exit 1
          fi
          if [ -z "$VERSION" ]; then
            echo "::error::Could not parse version from $SOURCE"
            exit 1
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "source=${SOURCE}" >> "$GITHUB_OUTPUT"
          echo "Detected version=${VERSION} from ${SOURCE}"

      - name: Compute tags + platforms
        id: tags
        run: |
          IMAGE="ghcr.io/zelosai/${{ github.event.repository.name }}"
          VERSION="${{ steps.version.outputs.version }}"
          SHA_SHORT="${GITHUB_SHA::7}"
          TAGS="${IMAGE}:sha-${SHA_SHORT}"
          ARM64=false

          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            TAG_VERSION="${GITHUB_REF#refs/tags/v}"
            if [ "$TAG_VERSION" != "$VERSION" ]; then
              echo "::error::Git tag v${TAG_VERSION} does not match repo version v${VERSION} (${{ steps.version.outputs.source }})"
              exit 1
            fi
            TAGS="${TAGS},${IMAGE}:v${VERSION},${IMAGE}:latest,${IMAGE}:stable"
            ARM64=true
          elif [[ "$GITHUB_REF" == refs/heads/main ]]; then
            TAGS="${TAGS},${IMAGE}:v${VERSION},${IMAGE}:latest,${IMAGE}:stable"
            ARM64=true
          elif [[ "$GITHUB_REF" == refs/heads/develop ]]; then
            TAGS="${TAGS},${IMAGE}:v${VERSION}-dev,${IMAGE}:latest"
          fi

          if [ "$ARM64" = "true" ]; then
            PLATFORMS="linux/amd64,linux/arm64"
          else
            PLATFORMS="linux/amd64"
          fi

          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"
          echo "platforms=${PLATFORMS}" >> "$GITHUB_OUTPUT"
          echo "sha-short=${SHA_SHORT}" >> "$GITHUB_OUTPUT"
          echo "Computed tags: ${TAGS}"
          echo "Build platforms: ${PLATFORMS}"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if SHA image already satisfies platforms
        id: existing
        env:
          SRC: ${{ steps.tags.outputs.image }}:sha-${{ steps.tags.outputs.sha-short }}
          REQUIRED: ${{ steps.tags.outputs.platforms }}
        run: |
          if ! docker manifest inspect "$SRC" >/dev/null 2>&1; then
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "No existing SHA image at $SRC"
            exit 0
          fi
          HAVE=$(docker manifest inspect "$SRC" \
            | jq -r '(.manifests // [] | map("\(.platform.os)/\(.platform.architecture)"))[]' 2>/dev/null \
            | sort -u | paste -sd,)
          if [ -z "$HAVE" ]; then
            HAVE="linux/amd64"
          fi
          echo "Existing platforms: $HAVE; required: $REQUIRED"
          missing=false
          IFS=',' read -ra REQ <<< "$REQUIRED"
          for p in "${REQ[@]}"; do
            echo "$HAVE" | tr ',' '\n' | grep -qx "$p" || missing=true
          done
          if [ "$missing" = "false" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up QEMU (for arm64 cross-build)
        if: steps.existing.outputs.exists != 'true' && contains(steps.tags.outputs.platforms, 'arm64')
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - uses: docker/setup-buildx-action@v3

      - name: Build + push
        if: steps.existing.outputs.exists != 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: ${{ steps.tags.outputs.platforms }}
          tags: ${{ steps.tags.outputs.tags }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.licenses=MIT
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Retag existing SHA image (skip rebuild)
        if: steps.existing.outputs.exists == 'true'
        env:
          SRC: ${{ steps.tags.outputs.image }}:sha-${{ steps.tags.outputs.sha-short }}
          TAGS: ${{ steps.tags.outputs.tags }}
        run: |
          set -e
          IFS=',' read -ra TAG_ARR <<< "$TAGS"
          ARGS=()
          for t in "${TAG_ARR[@]}"; do
            [ "$t" = "$SRC" ] && continue
            ARGS+=("--tag" "$t")
          done
          if [ ${#ARGS[@]} -gt 0 ]; then
            echo "Retagging $SRC -> ${ARGS[*]}"
            docker buildx imagetools create "${ARGS[@]}" "$SRC"
          else
            echo "Nothing to retag (only sha tag)."
          fi
