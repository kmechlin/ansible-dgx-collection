---
name: lint
on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: ansible_collections/kmechlin/dgx

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install ansible ansible-lint yamllint
          ansible-galaxy collection install -r ansible_collections/kmechlin/dgx/requirements.yml

      - name: yamllint
        working-directory: ansible_collections/kmechlin/dgx
        run: yamllint .

      - name: ansible-lint
        working-directory: ansible_collections/kmechlin/dgx
        run: ansible-lint

      - name: syntax-check
        working-directory: ansible_collections/kmechlin/dgx
        run: |
          for pb in playbooks/*.yml; do
            ansible-playbook -i inventory/hosts.yml "$pb" --syntax-check
          done
