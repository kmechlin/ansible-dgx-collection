---
name: lint
on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: ansible_collections/zelos/dgx

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install ansible ansible-lint yamllint
          ansible-galaxy collection install -r ansible_collections/zelos/dgx/requirements.yml

      - name: yamllint
        working-directory: ansible_collections/zelos/dgx
        run: yamllint .

      - name: ansible-lint
        working-directory: ansible_collections/zelos/dgx
        run: ansible-lint

      - name: syntax-check
        working-directory: ansible_collections/zelos/dgx
        env:
          ANSIBLE_COLLECTIONS_PATH: ${{ github.workspace }}
        run: |
          for pb in playbooks/*.yml; do
            ansible-playbook -i inventory/hosts.yml "$pb" --syntax-check
          done
